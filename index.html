<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Be+Vietnam+Pro:wght@400;700&display=swap');
  :root {
    /* Màu sắc chuẩn Soulcard */
    --sc-purple: #A78BFA;       /* Tím chủ đạo */
    --sc-mint: #BDEFE3;         /* Xanh mint phụ */
    --sc-cream-bg: #FFF8F0;     /* Nền kem nhạt */
    --sc-text-dark: #2F2F2F;    /* Chữ xám đậm */
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

 #sc-app {
    font-family: 'Be Vietnam Pro', sans-serif; /* Đổi phông chữ nội dung */
    background: var(--sc-cream-bg);            /* Đổi sang màu nền kem */
    min-height: 600px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #sc-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #sc-logo {
    font-family: 'Nunito', sans-serif; /* Phông chữ tròn trịa cho logo */
    font-size: 22px;
    font-weight: 800;
    color: var(--sc-purple);           /* Màu tím chủ đạo */
    letter-spacing: -0.5px;
  }
#sc-tagline {
  font-family: 'Be Vietnam Pro', sans-serif; /* Phông chữ nội dung */
  font-size: 13px;                          /* Kích thước chữ nhỏ hơn logo */
  font-weight: 400;                         /* Nét chữ mảnh */
  color: var(--sc-text-dark);               /* Màu xám đậm */
  font-style: italic;                       /* In nghiêng theo phong cách slogan */
  margin-top: 4px;                          /* Khoảng cách với tên Soulcard */
  letter-spacing: 0.2px;
}
  #sc-logo span { color: var(--color-text-secondary); font-weight: 400; font-size: 13px; margin-left: 6px; }

 #message-window {
    background: var(--white);
    border: 3px dashed var(--sc-mint); /* Viền nét đứt màu xanh mint */
    border-radius: 20px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #message-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  #message-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 36px;
    align-items: center;
  }
  .msg-chip {
    background: var(--sc-teal-light);
    color: var(--sc-teal-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .msg-chip:hover { opacity: 0.75; }
  .msg-chip .rm { font-size: 12px; opacity: 0.6; }
  #msg-empty { font-size: 13px; color: var(--color-text-tertiary); font-style: italic; }

  #message-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    border-top: 0.5px solid var(--color-border-tertiary);
    padding-top: 8px;
    flex-wrap: wrap;
  }
  .btn-speak {
    background: var(--sc-teal);
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-speak:hover { opacity: 0.85; }
  .btn-speak:active { transform: scale(0.97); }
  .btn-speak.speaking { background: var(--sc-coral); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  .btn-clear {
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 14px;
    font-size: 13px;
    color: var(--color-text-secondary);
    cursor: pointer;
  }
  .btn-clear:hover { background: var(--color-background-secondary); }

  #category-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  #category-nav::-webkit-scrollbar { display: none; }
  .cat-btn {
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
    opacity: 0.65;
  }
  .cat-btn.active { opacity: 1; transform: scale(1.04); }
  .cat-btn:hover { opacity: 0.9; }

  #card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }

  .comm-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 14px 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    user-select: none;
    min-height: 100px;
    border-top: 3px solid transparent;
  }
  .comm-card:hover { transform: translateY(-2px); border-color: var(--card-accent); }
  .comm-card:active { transform: scale(0.95); }
  .comm-card.pressed { transform: scale(0.93); }

  .card-icon {
    font-size: 32px;
    line-height: 1;
    filter: none;
  }
  .card-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    text-align: center;
    line-height: 1.3;
  }

  #tts-status {
    font-size: 12px;
    color: var(--color-text-secondary);
    text-align: center;
    padding: 2px 0;
    min-height: 18px;
  }

  #sc-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
  }
  .footer-btn {
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 6px 12px;
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
  }
  .footer-btn:hover { background: var(--color-background-secondary); }

#sc-logo-area {
  display: flex;
  align-items: center;    /* Căn logo và chữ nằm ngang hàng nhau */
  justify-content: center; /* Đưa toàn bộ cụm logo ra giữa màn hình */
  gap: 15px;               /* Khoảng cách an toàn giữa logo và chữ */
  margin-bottom: 20px;
}

#main-logo {
  height: 55px;            /* Chỉnh độ cao logo vừa phải */
  width: auto;             /* Tự động tính chiều rộng để không bị méo ảnh */
  object-fit: contain;
}

#sc-text-group {
  display: flex;
  flex-direction: column;  /* Tên Soulcard ở trên, Tagline ở dưới */
  text-align: left;        /* Căn chữ lề trái so với logo */
}
/* Tối ưu tổng thể cho màn hình nhỏ */
@media (max-width: 600px) {
  #sc-app {
    padding: 10px; /* Giảm khoảng cách viền ngoài */
    gap: 10px;
  }

  /* Logo và Tagline nhỏ lại để tiết kiệm diện tích */
  #main-logo {
    height: 40px; 
  }
  #sc-logo {
    font-size: 18px;
  }
  #sc-tagline {
    font-size: 11px;
  }

  /* Cửa sổ ghép câu: Tăng độ cao để dễ nhìn khi nhiều thẻ */
  #message-window {
    padding: 8px;
    border-width: 2px;
  }
  
  /* Lưới thẻ: Quan trọng nhất - Chia 3 cột trên điện thoại */
  #card-grid {
    grid-template-columns: repeat(3, 1fr); 
    gap: 8px;
  }

  /* Thẻ giao tiếp: Chỉnh kích thước icon và chữ cho vừa tay */
  .comm-card {
    min-height: 90px;
    padding: 8px 4px;
  }
  .card-icon {
    height: 50px !important; /* Thu nhỏ ảnh một chút */
  }
  .card-label {
    font-size: 12px;
    line-height: 1.2;
  }

  /* Thanh chọn danh mục: Cho phép vuốt ngang mượt hơn */
  #category-nav {
    gap: 4px;
    padding-bottom: 8px;
  }
  .cat-btn {
    padding: 5px 12px;
    font-size: 12px;
  }

  /* Các nút bấm: Làm to ra để dễ chạm bằng ngón tay (Touch target) */
  .btn-speak {
    width: 100%; /* Nút Đọc câu to rõ ràng */
    justify-content: center;
    padding: 12px;
  }
  
  .btn-clear, .footer-btn {
    padding: 10px;
    flex-grow: 1; /* Các nút phụ chia đều không gian */
    text-align: center;
  }
}

/* Ngăn người dùng phóng to thu nhỏ lung tung gây lệch giao diện */
html, body {
  touch-action: manipulation;
  overflow-x: hidden;
}
</style>

            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            ĐỌC CÂU
        </button>

        <button class="btn-clear" onclick="clearMessage()" style="padding: 8px; font-size: 12px;">Xóa hết</button>
        <button class="btn-clear" onclick="removeLastWord()" style="padding: 8px; font-size: 12px;">← Xóa từ cuối</button>
        <button onclick="openAddCard()" style="padding: 8px 12px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px;">+ Thêm thẻ</button>
    </div>
</div>

  <div id="category-nav"></div>
  <div id="card-grid"></div>
  <div id="tts-status"></div>

  <div id="sc-footer">
    <button class="footer-btn" onclick="sendPrompt('Propose more Vietnamese AAC card ideas for Soulcard: daily routines, school vocabulary, and medical needs')">Gợi ý thêm thẻ ↗</button>
    <button class="footer-btn" onclick="sendPrompt('Show me how to implement the NFC card management dashboard for Soulcard')">Module NFC ↗</button>
  </div>
</div>

    { id: 603, label: 'Mẹ', slug: 'me', icon: 'doi-tuong-va-noi-chon/me.JPG', cat: 'doi-tuong-noi-chon', accent: '#534AB7', bg: '#EEEDFE' },
    { id: 701, label: 'Nhà', slug: 'nha', icon: 'doi-tuong-va-noi-chon/nha.JPG', cat: 'doi-tuong-noi-chon', accent: '#3B6D11', bg: '#EAF3DE' },
    { id: 702, label: 'Trường học', slug: 'truong', icon: 'doi-tuong-va-noi-chon/truong.JPG', cat: 'doi-tuong-noi-chon', accent: '#3B6D11', bg: '#EAF3DE' }
];
let CARDS = [...defaultCards, ...savedCards];
let sentence = [];
let currentCat = 'all';
let isSpeaking = false;

function renderCategories() {
  const nav = document.getElementById('category-nav');
  nav.innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn${c.id===currentCat?' active':''}"
      style="background:${c.bg};color:${c.color};"
      onclick="filterCat('${c.id}')">${c.label}</button>
  `).join('');
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  // Lọc thẻ theo danh mục đang chọn
  const filtered = currentCat === 'all' ? CARDS : CARDS.filter(c => c.cat === currentCat);
  
  // Vẽ từng chiếc thẻ lên màn hình (Đoạn đã sửa để hiện ảnh)
  grid.innerHTML = filtered.map(card => `
    <div class="comm-card" style="border-top-color:${card.accent}; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;"
      onclick="addWord('${card.label}', this)"
      role="button">
      
      ${card.id > 1000 ? `
        <div onclick="deleteCard(${card.id}, event)" 
             style="position: absolute; top: 0; right: 5px; color: #ff4444; font-weight: bold; font-size: 18px; padding: 5px; cursor: pointer; z-index: 10;">
             ✕
        </div>
      ` : ''}

      <div class="card-icon" style="width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px;">
          <img src="${card.icon}" 
               style="max-width: 100%; max-height: 100%; object-fit: contain;" 
               onerror="this.style.display='none'; this.parentNode.innerHTML='❌'">
      </div>
      
      <div class="card-label" style="font-size: 14px; font-weight: 500; text-align: center;">${card.label}</div>
    </div>
  `).join('');
}

function filterCat(id) {
  currentCat = id;
  renderCategories();
  renderCards();
}
function renderMessage() {
  const container = document.getElementById('message-chips');
  if (sentence.length === 0) {
    container.innerHTML = '<span id="msg-empty">Chọn thẻ để bắt đầu ghép câu...</span>';
  } else {
    container.innerHTML = sentence.map((w,i) => `
      <div class="msg-chip" onclick="removeWord(${i})">
        ${w} <span class="rm">✕</span>
      </div>
    `).join('');
  }
}

function addWord(label, el) {
  sentence.push(label);
  renderMessage();
  if (el) {
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 200);
  }
}

function removeWord(index) {
  sentence.splice(index, 1);
  renderMessage();
}

function removeLastWord() {
  if (sentence.length > 0) {
    sentence.pop();
    renderMessage();
  }
}

function clearMessage() {
  sentence = [];
  renderMessage();
  setStatus('');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function setStatus(msg) {
  document.getElementById('tts-status').textContent = msg;
}

async function speakMessage() {
    if (sentence.length === 0) {
        setStatus('Vui lòng chọn thẻ trước!');
        return;
    }

    const speed = document.getElementById('speed-range').value || 1;
    setStatus('Đang chuẩn bị giọng: ' + currentRegion);

    // Hàm phụ để phát một âm thanh và đợi nó kết thúc
    const playAudio = (slug) => {
        return new Promise((resolve) => {
            const wavFiles = ['buon-ngu', 'dau', 'di-ve-sinh', 'doi', 'dung-lai', 'giup-con', 'khat', 'lanh', 'met'];
            const ext = wavFiles.includes(slug) ? 'wav' : 'mp3';
            const audioPath = `${currentRegion}/${slug}.${ext}`;
            
            const audio = new Audio(audioPath);
            audio.playbackRate = speed; // Áp dụng tốc độ chọn trên thanh trượt
            
            audio.onended = resolve; // Khi đọc xong thì báo để đọc từ tiếp theo
            audio.onerror = () => {
                console.error("Không thấy file:", audioPath);
                resolve(); // Nếu lỗi file này thì bỏ qua để đọc từ tiếp theo
            };
            audio.play().catch(resolve);
        });
    };

    // Vòng lặp đọc từng thẻ trong câu
    for (let wordLabel of sentence) {
        const cardInfo = CARDS.find(c => c.label === wordLabel);
        if (cardInfo && cardInfo.slug) {
            setStatus('Đang đọc: ' + wordLabel);
            await playAudio(cardInfo.slug);
        }
    }
    
    setStatus('Đã đọc xong!');
}
function openAddCard() {
    const label = prompt("Tên thẻ mới là gì? (Ví dụ: Đi tắm)");
    const icon = prompt("Biểu tượng Emoji là gì? (Ví dụ: 🚿)");
    
    if (label && icon) {
        const newCard = {
            id: Date.now(),
            label: label,
            icon: icon,
            cat: 'hoat-dong', // Thẻ mới sẽ nằm trong mục Hành Động
            accent: '#185FA5', 
            bg: '#E6F1FB'
        };

        // Thêm vào danh sách đang hiển thị
        CARDS.push(newCard);
        
        // Lưu vào bộ nhớ máy (F5 không mất)
        const currentSaved = JSON.parse(localStorage.getItem('mySoulCards')) || [];
        currentSaved.push(newCard);
        localStorage.setItem('mySoulCards', JSON.stringify(currentSaved));

        // Vẽ lại các thẻ trên màn hình ngay lập tức
        renderCards(); 
        alert("Tuyệt vời! Bạn đã có thẻ mới.");
    }
}
renderCategories();
renderCards();

function deleteCard(id, event) {
    // Dòng này để máy hiểu: "Chỉ xóa thôi, đừng có chọn thẻ này vào câu"
    event.stopPropagation();

    // Hiện bảng hỏi xác nhận cho chắc chắn
    if (confirm("Bạn có muốn xóa thẻ này không?")) {
        // Tìm và xóa trong bộ nhớ trình duyệt
        let currentSaved = JSON.parse(localStorage.getItem('mySoulCards')) || [];
        currentSaved = currentSaved.filter(card => card.id !== id);
        localStorage.setItem('mySoulCards', JSON.stringify(currentSaved));

        // Xóa trong danh sách đang hiện trên màn hình
        CARDS = CARDS.filter(card => card.id !== id);

        // Vẽ lại giao diện mới (đã mất thẻ vừa xóa)
        renderCards();
    }
}
// Lệnh xử lý: Khi người dùng kéo thanh trượt, con số hiển thị phải thay đổi theo
const sRange = document.getElementById('speed-range');
const sVal = document.getElementById('speed-val');

if (sRange && sVal) {
    sRange.addEventListener('input', () => {
        // Cập nhật chữ hiển thị (ví dụ: 1.2x)
        sVal.textContent = sRange.value + 'x';
    });
}
</script>
